<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe 2 Pemain</title>
    <style>
        :root {
            --bg: #000000;
            --board-bg: #0a0a0a;
            --cell-bg: #1a1a1a;
            --cell-hover: #2a2a2a;
            --cell-border: #ffffff;
            --player1-badge: #e94560;
            --player2-badge: #00d2ff;
            --text: #ffffff;
            --win-highlight: #ffd700;
            --draw-color: #aaaaaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        /* === PARTICLE BACKGROUND === */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
            background: rgba(255, 255, 255, 0.15);
            width: 4px;
            height: 4px;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.1;
            }
            100% {
                transform: translateY(-110vh) scale(2);
                opacity: 0;
            }
        }

        /* === MAIN CONTAINER === */
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        /* === PLAYER BADGES - POSITIONED ABSOLUTE ON SCREEN === */
        .player-badge {
            position: fixed;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 22px;
            border-radius: 16px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            background: rgba(20, 20, 20, 0.85);
            border: 2px solid #333;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            animation: badgePulse 3s ease-in-out infinite;
        }
        .player-badge.active-turn {
            transform: scale(1.06);
            border-color: #ffffff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            animation: activeGlow 0.8s ease-in-out infinite;
        }
        .player-badge.winner-badge {
            animation: winnerCelebrate 0.5s ease-in-out infinite;
            border-color: var(--win-highlight) !important;
            box-shadow: 0 0 35px rgba(255, 215, 0, 0.7), 0 0 70px rgba(255, 215, 0, 0.4) !important;
        }

        .badge-player2 {
            top: 20px;
            left: 20px;
        }
        .badge-player1 {
            bottom: 20px;
            right: 20px;
            flex-direction: row-reverse;
        }

        @keyframes badgePulse {
            0%,
            100% {
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            }
            50% {
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
            }
        }
        @keyframes activeGlow {
            0%,
            100% {
                border-color: #ffffff;
                box-shadow: 0 0 25px rgba(255, 255, 255, 0.25);
            }
            50% {
                border-color: #ffffff;
                box-shadow: 0 0 50px rgba(255, 255, 255, 0.5);
            }
        }
        @keyframes winnerCelebrate {
            0%,
            100% {
                transform: scale(1.06) rotate(0deg);
            }
            25% {
                transform: scale(1.1) rotate(-2deg);
            }
            75% {
                transform: scale(1.1) rotate(2deg);
            }
        }

        .badge-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.4rem;
            flex-shrink: 0;
            transition: all 0.3s;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        .badge-player2 .badge-icon {
            background: var(--player2-badge);
            color: #000;
            box-shadow: 0 0 20px var(--player2-badge);
        }
        .badge-player1 .badge-icon {
            background: var(--player1-badge);
            color: #fff;
            box-shadow: 0 0 20px var(--player1-badge);
        }

        .badge-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .badge-name {
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #aaa;
        }
        .badge-symbol {
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            color: #fff;
        }
        .badge-player2 .badge-symbol {
            text-shadow: 0 0 8px var(--player2-badge);
        }
        .badge-player1 .badge-symbol {
            text-shadow: 0 0 8px var(--player1-badge);
        }
        .badge-score {
            font-weight: 700;
            font-size: 1.5rem;
            color: #fff;
            min-width: 30px;
            text-align: center;
            transition: all 0.3s;
        }

        /* === TITLE === */
        .title {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-align: center;
            color: #fff;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5));
            margin-top: 10px;
        }

        /* === STATUS BAR === */
        .status-bar {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #ccc;
            text-align: center;
            min-height: 30px;
            transition: all 0.3s;
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.06);
        }
        .status-bar.win-status {
            color: var(--win-highlight);
            font-weight: 800;
            animation: statusGlow 0.6s ease-in-out infinite;
        }
        .status-bar.draw-status {
            color: var(--draw-color);
            font-weight: 700;
        }
        @keyframes statusGlow {
            0%,
            100% {
                text-shadow: 0 0 10px var(--win-highlight);
            }
            50% {
                text-shadow: 0 0 30px var(--win-highlight), 0 0 50px rgba(255, 215, 0, 0.6);
            }
        }

        /* === BOARD === */
        .board-wrapper {
            position: relative;
            background: var(--board-bg);
            border-radius: 24px;
            padding: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), inset 0 0 0 2px rgba(255, 255, 255, 0.1);
            border: 1px solid #333;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 6px;
            width: min(320px, 75vw);
            height: min(320px, 75vw);
        }
        .cell {
            background: var(--cell-bg);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: 900;
            transition: all 0.25s ease;
            position: relative;
            border: 3px solid #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        .cell:not(.taken):hover {
            background: var(--cell-hover);
            border-color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.15), 0 0 15px rgba(255, 255, 255, 0.3);
        }
        .cell:not(.taken):active {
            transform: scale(0.93);
            transition: transform 0.1s;
        }
        .cell.taken {
            cursor: not-allowed;
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cell.win-cell {
            animation: winPulse 0.7s ease-in-out infinite;
            border-color: var(--win-highlight) !important;
            background: #2a3a20 !important;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 0 0 60px rgba(255, 215, 0, 0.3) !important;
            color: #ffffff !important;
            text-shadow: 0 0 15px #ffd700;
        }
        /* X dan O berwarna putih */
        .cell.x-mark,
        .cell.o-mark {
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9), 0 0 30px rgba(255, 255, 255, 0.4);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            60% {
                transform: scale(1.15);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes winPulse {
            0%,
            100% {
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 0 0 60px rgba(255, 215, 0, 0.3);
            }
            50% {
                box-shadow: 0 0 50px rgba(255, 215, 0, 0.9), 0 0 90px rgba(255, 215, 0, 0.5);
            }
        }

        /* === BUTTONS === */
        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: all 0.3s;
            text-transform: uppercase;
            color: #fff;
        }
        .btn-reset {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffffff;
            backdrop-filter: blur(10px);
        }
        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .btn-new-game {
            background: #ffffff;
            color: #000000;
            font-weight: 800;
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.3);
        }
        .btn-new-game:hover {
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.5);
            transform: translateY(-3px);
        }
        .btn:active {
            transform: scale(0.94);
            transition: transform 0.1s;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .player-badge {
                padding: 10px 16px;
                gap: 8px;
            }
            .badge-icon {
                width: 36px;
                height: 36px;
                font-size: 1.1rem;
            }
            .badge-name {
                font-size: 0.7rem;
            }
            .badge-symbol {
                font-size: 1rem;
            }
            .badge-score {
                font-size: 1.2rem;
            }
            .cell {
                font-size: 2.8rem;
                border-radius: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Partikel animasi background -->
    <div class="particles" id="particles"></div>

    <!-- Badge Player 2 (pojok kiri atas) -->
    <div class="player-badge badge-player2" id="badgePlayer2">
        <div class="badge-icon">O</div>
        <div class="badge-info">
            <span class="badge-name">Player 2</span>
            <span class="badge-symbol">O</span>
        </div>
        <div class="badge-score" id="scorePlayer2">0</div>
    </div>

    <!-- Badge Player 1 (pojok kanan bawah) -->
    <div class="player-badge badge-player1" id="badgePlayer1">
        <div class="badge-icon">X</div>
        <div class="badge-info">
            <span class="badge-name">Player 1</span>
            <span class="badge-symbol">X</span>
        </div>
        <div class="badge-score" id="scorePlayer1">0</div>
    </div>

    <!-- Konten Utama -->
    <div class="main-container">
        <h1 class="title">TIC-TAC-TOE</h1>
        <div class="status-bar" id="statusBar">Giliran Player 1 (X)</div>

        <div class="board-wrapper">
            <div class="board" id="board">
                <!-- 9 cells akan dibuat oleh JavaScript -->
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-reset" id="btnReset">Reset Papan</button>
            <button class="btn btn-new-game" id="btnNewGame">Game Baru</button>
        </div>
    </div>

    <script>
        (function() {
            // --- Game State ---
            const boardEl = document.getElementById('board');
            const statusBar = document.getElementById('statusBar');
            const badgePlayer1 = document.getElementById('badgePlayer1');
            const badgePlayer2 = document.getElementById('badgePlayer2');
            const scorePlayer1El = document.getElementById('scorePlayer1');
            const scorePlayer2El = document.getElementById('scorePlayer2');
            const particlesContainer = document.getElementById('particles');

            let board = Array(9).fill(null);
            let currentPlayer = 'X'; // X = Player 1, O = Player 2
            let gameActive = true;
            let winCombo = null;

            // Skor
            let scorePlayer1 = 0;
            let scorePlayer2 = 0;

            // Kombinasi menang
            const winPatterns = [
                [0, 1, 2],
                [3, 4, 5],
                [6, 7, 8], // baris
                [0, 3, 6],
                [1, 4, 7],
                [2, 5, 8], // kolom
                [0, 4, 8],
                [2, 4, 6] // diagonal
            ];

            // --- Partikel Background ---
            function createParticles() {
                const count = 40;
                particlesContainer.innerHTML = '';
                for (let i = 0; i < count; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    const size = Math.random() * 5 + 2;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.bottom = -10 + 'px';
                    particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
                    particle.style.animationDelay = Math.random() * 10 + 's';
                    particle.style.background = `rgba(255, 255, 255, ${Math.random() * 0.3 + 0.1})`;
                    particlesContainer.appendChild(particle);
                }
            }
            createParticles();

            // --- Render Board ---
            function renderBoard() {
                boardEl.innerHTML = '';
                board.forEach((mark, index) => {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.index = index;
                    if (mark) {
                        cell.textContent = mark;
                        cell.classList.add('taken');
                        cell.classList.add(mark === 'X' ? 'x-mark' : 'o-mark');
                    }
                    // Sorot sel pemenang
                    if (winCombo && winCombo.includes(index)) {
                        cell.classList.add('win-cell');
                    }
                    cell.addEventListener('click', handleCellClick);
                    boardEl.appendChild(cell);
                });
            }

            // --- Update UI status & badge highlight ---
            function updateUI() {
                // Status bar
                if (!gameActive && winCombo) {
                    const winner = board[winCombo[0]];
                    const playerName = winner === 'X' ? 'Player 1 (X)' : 'Player 2 (O)';
                    statusBar.textContent = `${playerName} Menang! 🎉`;
                    statusBar.className = 'status-bar win-status';
                } else if (!gameActive && !winCombo) {
                    statusBar.textContent = 'Seri! 🤝';
                    statusBar.className = 'status-bar draw-status';
                } else {
                    const turnName = currentPlayer === 'X' ? 'Player 1 (X)' : 'Player 2 (O)';
                    statusBar.textContent = `Giliran ${turnName}`;
                    statusBar.className = 'status-bar';
                }

                // Badge highlight
                badgePlayer1.classList.remove('active-turn', 'winner-badge');
                badgePlayer2.classList.remove('active-turn', 'winner-badge');

                if (!gameActive && winCombo) {
                    const winner = board[winCombo[0]];
                    if (winner === 'X') {
                        badgePlayer1.classList.add('winner-badge');
                    } else {
                        badgePlayer2.classList.add('winner-badge');
                    }
                } else if (gameActive) {
                    if (currentPlayer === 'X') {
                        badgePlayer1.classList.add('active-turn');
                    } else {
                        badgePlayer2.classList.add('active-turn');
                    }
                }

                // Update skor
                scorePlayer1El.textContent = scorePlayer1;
                scorePlayer2El.textContent = scorePlayer2;
            }

            // --- Check winner ---
            function checkWinner() {
                for (const pattern of winPatterns) {
                    const [a, b, c] = pattern;
                    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                        winCombo = pattern;
                        return board[a];
                    }
                }
                return null;
            }

            // --- Handle click ---
            function handleCellClick(e) {
                const cell = e.currentTarget;
                const index = parseInt(cell.dataset.index);

                if (!gameActive || board[index]) return;

                // Buat langkah
                board[index] = currentPlayer;
                renderBoard();

                const winner = checkWinner();
                if (winner) {
                    gameActive = false;
                    // Update skor
                    if (winner === 'X') {
                        scorePlayer1++;
                    } else {
                        scorePlayer2++;
                    }
                    updateUI();
                    renderBoard(); // re-render untuk sorot
                    return;
                }

                // Cek seri
                if (board.every(cell => cell !== null)) {
                    gameActive = false;
                    winCombo = null;
                        updateUI();
                    return;
                }

                // Ganti pemain
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                updateUI();
            }

            // --- Reset papan (tidak reset skor) ---
            function resetBoard() {
                board = Array(9).fill(null);
                currentPlayer = 'X';
                gameActive = true;
                winCombo = null;
                renderBoard();
                updateUI();
            }

            // --- Game baru (reset skor juga) ---
            function newGame() {
                scorePlayer1 = 0;
                scorePlayer2 = 0;
                resetBoard();
            }

            // --- Event Listeners ---
            document.getElementById('btnReset').addEventListener('click', resetBoard);
            document.getElementById('btnNewGame').addEventListener('click', newGame);

            // --- Inisialisasi ---
            renderBoard();
            updateUI();
        })();
    </script>
</body>
</html>
