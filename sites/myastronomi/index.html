<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100K Stars Clone</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:Arial,sans-serif;
}

/* Canvas */
canvas{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
}

/* Overlay */
.overlay{
    position:fixed;
    inset:0;
    background:
    linear-gradient(
        to bottom,
        rgba(0,0,0,0.7),
        transparent 30%,
        transparent 70%,
        rgba(0,0,0,0.7)
    );
    pointer-events:none;
}

/* Title */
.title{
    position:fixed;
    top:30px;
    left:30px;
    z-index:10;
    color:white;
}

.title h1{
    font-size:45px;
    letter-spacing:5px;
    text-shadow:0 0 20px cyan;
}

.title p{
    margin-top:10px;
    color:#aaa;
    max-width:300px;
    line-height:1.6;
}

/* Info Box */
.info{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:950px;
    padding:30px;
    background:rgba(0,0,0,0.45);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:25px;
    backdrop-filter:blur(10px);
    color:white;
    z-index:10;
}

.info h2{
    text-align:center;
    margin-bottom:15px;
    color:cyan;
    font-size:30px;
}

.info p{
    text-align:center;
    color:#ddd;
    line-height:1.9;
    font-size:17px;
}

/* Mobile */
@media(max-width:700px){

    .title h1{
        font-size:30px;
    }

    .info{
        bottom:15px;
        padding:20px;
    }

    .info h2{
        font-size:22px;
    }

    .info p{
        font-size:14px;
    }

}

</style>
</head>
<body>

<canvas id="galaxy"></canvas>

<div class="overlay"></div>

<div class="title">
    <h1>GALAXY</h1>

    <p>
        Simulasi tata surya
        yang bergerak bersama
        mengelilingi galaksi.
    </p>
</div>

<div class="info">

    <h2>🌌 Tata Surya Di Dalam Galaksi</h2>

    <p>
        Matahari bergerak mengelilingi pusat
        galaksi Bima Sakti sambil membawa
        seluruh planet.
        Planet tetap mengorbit Matahari
        karena gaya gravitasi.
    </p>

</div>

<script>

const canvas =
document.getElementById("galaxy");

const ctx =
canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

/* Resize */

window.addEventListener("resize",()=>{

    canvas.width = innerWidth;
    canvas.height = innerHeight;

});

/* STARFIELD */

const stars = [];

for(let i=0;i<3000;i++){

    stars.push({

        x:(Math.random()-0.5)*5000,
        y:(Math.random()-0.5)*5000,
        z:Math.random()*5000

    });

}

/* PLANETS */

const planets = [

{
    radius:70,
    size:4,
    color:"#9e9e9e",
    speed:0.04
},

{
    radius:100,
    size:7,
    color:"#cfa76f",
    speed:0.032
},

{
    radius:145,
    size:8,
    color:"#00bfff",
    speed:0.026
},

{
    radius:190,
    size:6,
    color:"#ff3b30",
    speed:0.021
},

{
    radius:260,
    size:16,
    color:"#d2b48c",
    speed:0.016
},

{
    radius:340,
    size:14,
    color:"#e1c16e",
    speed:0.012
},

{
    radius:420,
    size:12,
    color:"#7df9ff",
    speed:0.009
},

{
    radius:500,
    size:12,
    color:"#4169e1",
    speed:0.007
}

];

let galaxyMove = 0;

/* Mouse Camera */

let mx = innerWidth/2;
let my = innerHeight/2;

window.addEventListener("mousemove",(e)=>{

    mx = e.clientX;
    my = e.clientY;

});

/* Animate */

function draw(){

    ctx.fillStyle =
    "rgba(0,0,0,0.18)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    /* Camera effect */

    const camX =
    (mx - canvas.width/2)*0.02;

    const camY =
    (my - canvas.height/2)*0.02;

    /* Draw stars */

    for(let star of stars){

        star.z -= 8;

        if(star.z <= 1){

            star.z = 5000;

        }

        const scale =
        800 / star.z;

        const x =
        star.x * scale +
        canvas.width/2 +
        camX;

        const y =
        star.y * scale +
        canvas.height/2 +
        camY;

        const size =
        (1 - star.z/5000)*3;

        ctx.beginPath();

        ctx.fillStyle = "white";

        ctx.arc(
            x,
            y,
            size,
            0,
            Math.PI*2
        );

        ctx.fill();

    }

    /* Matahari gerak */

    galaxyMove += 0.002;

    const sunX =
    canvas.width/2 +
    Math.cos(galaxyMove)*260;

    const sunY =
    canvas.height/2 +
    Math.sin(galaxyMove)*120;

    /* Glow */

    const glow =
    ctx.createRadialGradient(
        sunX,
        sunY,
        10,
        sunX,
        sunY,
        120
    );

    glow.addColorStop(
        0,
        "rgba(255,255,120,1)"
    );

    glow.addColorStop(
        0.3,
        "rgba(255,140,0,.8)"
    );

    glow.addColorStop(
        1,
        "rgba(255,140,0,0)"
    );

    ctx.fillStyle = glow;

    ctx.beginPath();

    ctx.arc(
        sunX,
        sunY,
        120,
        0,
        Math.PI*2
    );

    ctx.fill();

    /* Matahari */

    ctx.beginPath();

    ctx.fillStyle = "orange";

    ctx.arc(
        sunX,
        sunY,
        38,
        0,
        Math.PI*2
    );

    ctx.fill();

    /* Planet */

    planets.forEach((planet,index)=>{

        const angle =
        Date.now()*0.001*
        planet.speed;

        const px =
        sunX +
        Math.cos(angle+index)*
        planet.radius;

        const py =
        sunY +
        Math.sin(angle+index)*
        planet.radius;

        /* Orbit */

        ctx.beginPath();

        ctx.strokeStyle =
        "rgba(255,255,255,0.07)";

        ctx.arc(
            sunX,
            sunY,
            planet.radius,
            0,
            Math.PI*2
        );

        ctx.stroke();

        /* Planet */

        ctx.beginPath();

        ctx.fillStyle =
        planet.color;

        ctx.arc(
            px,
            py,
            planet.size,
            0,
            Math.PI*2
        );

        ctx.fill();

        /* Saturn ring */

        if(index === 5){

            ctx.beginPath();

            ctx.strokeStyle =
            "#d6c28a";

            ctx.ellipse(
                px,
                py,
                22,
                8,
                0,
                0,
                Math.PI*2
            );

            ctx.stroke();

        }

    });

    requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
